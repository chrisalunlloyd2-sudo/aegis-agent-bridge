name: Aegis Traffic Fetch
on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:
jobs:
  traffic:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch traffic (Cloudflare primary, GitHub fallback)
        run: python3 scripts/fetch_traffic.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: chrisalunlloyd2-sudo/living-ascii-art
      - name: Commit traffic.json
        run: |
          set -e
          git config user.name "Aegis"
          git config user.email "chrisalunlloyd2@gmail.com"
          git add traffic.json
          git diff --cached --quiet || (git commit -m "auto: update traffic.json" && git push origin main)
