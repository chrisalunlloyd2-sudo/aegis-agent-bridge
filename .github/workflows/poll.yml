name: Aegis Inbox Poll
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  poll:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python3 src/inbox_poller.py --once
        env:
          AEGIS_EMAIL: ${{ secrets.AEGIS_EMAIL }}
          AEGIS_PASSWORD: ${{ secrets.AEGIS_PASSWORD }}
      - name: Commit bridge state
        run: |
          set -e
          python3 - <<'PY'
          import json, os
          if os.path.exists('state.json'):
              with open('state.json') as f:
                  state = json.load(f)
              with open('bridge_state.json', 'w') as f:
                  json.dump(state, f, indent=2)
              print('wrote bridge_state.json')
          else:
              print('No state.json generated')
