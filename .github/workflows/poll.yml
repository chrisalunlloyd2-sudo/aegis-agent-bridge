name: Aegis Inbox Poll
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python3 src/inbox_poller.py --once
        env:
          AEGIS_EMAIL: ${{ secrets.AEGIS_EMAIL }}
          AEGIS_PASSWORD: ${{ secrets.AEGIS_PASSWORD }}
